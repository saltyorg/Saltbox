---
- name: Cleanup legacy qBittorrent hosts blocks
  ansible.builtin.replace:
    path: "/etc/hosts"
    regexp: '(?ms)^# BEGIN ANSIBLE ([A-Za-z0-9._-]+) MANAGED BLOCK\n(?:172\.19\.0\.1 \1\n)?# END ANSIBLE \1 MANAGED BLOCK\n?'
    replace: ""

- name: Add qBittorrent host install entries
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ANSIBLE QBITTORRENT HOST INSTALL MANAGED BLOCK"
    block: |-
      {% for instance in qbittorrent_role_host_install_instances | unique %}
      172.19.0.1 {{ instance }}
      {% endfor %}
  when: (qbittorrent_role_host_install_instances | length > 0)

- name: Remove qBittorrent host install entries
  ansible.builtin.blockinfile:
    path: "/etc/hosts"
    marker: "# {mark} ANSIBLE QBITTORRENT HOST INSTALL MANAGED BLOCK"
    state: absent
  when: (qbittorrent_role_host_install_instances | length == 0)
